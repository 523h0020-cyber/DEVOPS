# Docker Compose - Complete Stack Setup
# Services: Node.js Web App + MongoDB Database

version: '3.9'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:8.0-alpine
    container_name: mongodb
    restart: unless-stopped
    
    # Port mapping (only for local development)
    ports:
      - "27017:27017"
    
    # Environment variables
    environment:
      MONGO_INITDB_DATABASE: products_db
      # Optional: Set root credentials (use .env file in production)
      # MONGO_INITDB_ROOT_USERNAME: admin
      # MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    
    # Data persistence
    volumes:
      # Named volume for MongoDB data
      - mongodb_data:/data/db
      # Backup directory (optional)
      - ./backups:/backups
    
    # Networking
    networks:
      - midterm-network
    
    # Health check
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Node.js Web Application Service
  web:
    # Pull image from Docker Hub (replace with your Docker Hub username)
    image: ${DOCKER_HUB_USERNAME}/midterm-app:latest
    container_name: midterm-app
    restart: unless-stopped
    
    # Port mapping (internal port 3000)
    ports:
      - "3000:3000"
    
    # Environment variables
    environment:
      NODE_ENV: production
      PORT: 3000
      # Connect to MongoDB service via hostname (not IP)
      MONGO_URI: mongodb://mongodb:27017/products_db
    
    # Data persistence
    volumes:
      # Bind mount for user uploads (survives container restart)
      - ./public/uploads:/app/public/uploads
      # Optional: Bind mount for logs
      - ./logs:/app/logs
    
    # Networking - communicate with MongoDB via service name
    networks:
      - midterm-network
    
    # Dependencies - wait for MongoDB to be healthy
    depends_on:
      mongodb:
        condition: service_healthy
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (optional but recommended)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volumes for data persistence
volumes:
  mongodb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/midterm-app/mongodb

# Custom network for inter-container communication
networks:
  midterm-network:
    driver: bridge
